<style>
  :root {
    --primary:#0E4D64;
    --primary-light:#1A6B85;
    --accent:#E8A053;
    --bg:#F7F4EE;
    --card:#FFFFFF;
    --text:#1F2937;
    --muted:#6B7280;
    --border:#E5E7EB;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:'Segoe UI',system-ui,-apple-system,BlinkMacSystemFont,Tahoma,sans-serif;background:var(--bg);color:var(--text)}
  .app-shell{min-height:100vh;display:flex;flex-direction:column}
  .topbar{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;padding:22px 26px 18px;box-shadow:0 4px 12px rgba(0,0,0,.12);position:relative;z-index:20}
  .topbar-inner{max-width:1500px;margin:0 auto}
  .eyebrow{display:inline-block;background:rgba(255,255,255,.18);padding:5px 12px;border-radius:999px;font-size:11px;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
  h1{font-size:26px;line-height:1.2;margin:0 0 5px;font-weight:800}
  .subtitle{font-size:14px;opacity:.92;margin:0}
  .tabs-wrap{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:30;box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .tabs{max-width:1500px;margin:0 auto;display:flex;gap:8px;overflow-x:auto;padding:12px 16px;scrollbar-width:thin}
  .tab-btn{border:1px solid var(--border);background:#fff;color:var(--primary);padding:10px 14px;border-radius:999px;font-size:13px;font-weight:750;white-space:nowrap;cursor:pointer;transition:.18s ease;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .tab-btn:hover{background:#F7F4EE;border-color:#D6D3CC;transform:translateY(-1px)}
  .tab-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 5px 14px rgba(14,77,100,.22)}
  .viewer-area{flex:1;position:relative;min-height:calc(100vh - 150px);}
  .report-frame{width:100%;height:calc(100vh - 150px);border:0;display:block;background:#fff}
  .loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--primary);background:var(--bg)}
  @media(max-width:700px){
    .topbar{padding:18px 16px 14px}
    h1{font-size:21px}
    .subtitle{font-size:12px}
    .tabs{padding:10px}
    .tab-btn{font-size:12px;padding:9px 12px}
    .report-frame{height:calc(100vh - 145px)}
  }
</style>

const tabs = document.getElementById('tabs');
const frame = document.getElementById('reportFrame');
const loading = document.getElementById('loading');

function decodeHtml(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}

function loadReport(index) {
  loading.style.display = 'flex';
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === index);
  });
  const html = decodeHtml(reports[index].b64);
  frame.srcdoc = html;
  frame.onload = () => { loading.style.display = 'none'; };
}

reports.forEach((report, index) => {
  const btn = document.createElement('button');
  btn.className = 'tab-btn';
  btn.type = 'button';
  btn.textContent = report.name;
  btn.addEventListener('click', () => loadReport(index));
  tabs.appendChild(btn);
});

loadReport(0);
</script>
